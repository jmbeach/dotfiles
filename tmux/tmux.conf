# -------------------------------------
#
# Requires tmux plugin manager (tpm)
#
#  https://github.com/tmux-plugins/tpm
#
# -------------------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'dequis/tmux-url-select'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set-option -g history-limit 10000


# Uncomment to set default shell to fish
# set-option -g default-shell /usr/local/bin/fish
# set-option -g default-shell /usr/local/bin/pwsh
set-option -g default-shell /bin/zsh


set -g default-terminal "xterm-256color"
set-option -g focus-events on
set-option -sa terminal-features ',xterm-256color:RGB'
set-option -as terminal-features ',*:hyperlinks'
set-option -ga terminal-overrides ',xterm-256color:Tc'

# NOTE: If using WSL, do the following to help setup clipboard support
# curl -sLo /tmp/win32yank.zip https://github.com/equalsraf/win32yank/releases/download/v0.0.4/win32yank-x64.zip
# unzip -p /tmp/win32yank.zip win32yank.exe > /tmp/win32yank.exe
# chmod +x /tmp/win32yank.exe
# sudo mv /tmp/win32yank.exe /usr/local/bin/
# Renumber windows when a window closes
set-option -g renumber-windows on
set -g allow-passthrough on

# light colors
# tmux_orange="#e39b7b"
# tmux_yellow="#d8caac"
# tmux_green="#a7c080"
# tmux_gray="#c9ccd3"
# tmux_purple="#d39bb6"
# tmux_red='#e68183'
# tmux_background='#dce0e8'
# tmux_background_dark='#bec6d5'
# set -g @catppuccin_flavor 'latte'

# dark colors
tmux_orange="#e39b7b"
tmux_yellow="#d8caac"
tmux_green="#a7c080"
tmux_gray="#52525b"
tmux_purple="#d39bb6"
tmux_mauve="#4a3c5c"
tmux_red='#e68183'
tmux_background='#27272a'
tmux_background_dark='#3f3f46'

set -g @catppuccin_flavor 'mocha'

# Menu styling options
set -g @catppuccin_menu_selected_style "fg=#{@thm_fg},bold,bg=#{@thm_overlay_0}"

# Pane styling options
set -g @catppuccin_pane_status_enabled "no" # set to "yes" to enable
set -g @catppuccin_pane_border_status "off" # set to "yes" to enable
set -g @catppuccin_pane_border_style "fg=#{@thm_overlay_0}"
set -g @catppuccin_pane_active_border_style "##{?pane_in_mode,fg=#{@thm_lavender},##{?pane_synchronized,fg=#{@thm_mauve},fg=#{@thm_lavender}}}"
set -g @catppuccin_pane_left_separator "█"
set -g @catppuccin_pane_middle_separator "█"
set -g @catppuccin_pane_right_separator "█"
set -g @catppuccin_pane_color "#{@thm_green}"
set -g @catppuccin_pane_background_color "#{@thm_surface_0}"
set -g @catppuccin_pane_default_text "##{b:pane_current_path}"
set -g @catppuccin_pane_default_fill "number"
set -g @catppuccin_pane_number_position "left" # right, left

set -g @catppuccin_window_status_style "basic" # basic, rounded, slanted, custom, or none
set -g @catppuccin_window_text_color "#{@thm_surface_0}"
set -g @catppuccin_window_number_color "#{@thm_overlay_2}"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_number "#I"
set -g @catppuccin_window_current_text_color "#{@thm_surface_0}"
set -g @catppuccin_window_current_number_color "#{@thm_mauve}"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_current_number "#I"
set -g @catppuccin_window_number_position "left"
set -g @catppuccin_window_flags "icon" # none, icon, or text
set -g @catppuccin_window_flags_icon_last " " # -
set -g @catppuccin_window_flags_icon_current " 󰖯" # *
set -g @catppuccin_window_flags_icon_zoom " 󰁌" # Z
set -g @catppuccin_window_flags_icon_mark " 󰃀" # M
set -g @catppuccin_window_flags_icon_silent " 󰂛" # ~
set -g @catppuccin_window_flags_icon_activity " 󱅫" # #
set -g @catppuccin_window_flags_icon_bell " 󰂞" # !
# Matches icon order when using `#F` (`#!~[*-]MZ`)
set -g @catppuccin_window_flags_icon_format "##{?window_activity_flag,#{E:@catppuccin_window_flags_icon_activity},}##{?window_bell_flag,#{E:@catppuccin_window_flags_icon_bell},}##{?window_silence_flag,#{E:@catppuccin_window_flags_icon_silent},}##{?window_active,#{E:@catppuccin_window_flags_icon_current},}##{?window_last_flag,#{E:@catppuccin_window_flags_icon_last},}##{?window_marked_flag,#{E:@catppuccin_window_flags_icon_mark},}##{?window_active,##{?window_zoomed_flag,#{E:@catppuccin_window_flags_icon_zoom},},} "


# Status line options
set -g @catppuccin_status_left_separator "█"
set -g @catppuccin_status_middle_separator ""
set -g @catppuccin_status_right_separator "█"
set -g @catppuccin_status_connect_separator "yes" # yes, no
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_module_bg_color "#{@thm_surface_0}"
set -g @catppuccin_status_background "none"

set -g status-left-length 100
set -g status-right-length 100
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_application}"
set -gF window-status-separator ""



set -sg escape-time 1

set -g @continuum-restore 'on'

set -g mouse on

# Create new windows at the current directory
bind -N "Split window vertically (current path)" '"' split-window -c "#{pane_current_path}"
# bind '"' split-window -c "#{@my_current_path}"
bind -N "Split window horizontally (current path)" % split-window -h -c "#{pane_current_path}"
# bind % split-window -h -c "#{@my_current_path}"
bind -N "New window (current path)" c new-window -c "#{pane_current_path}"
# bind c new-window -c "#{@my_current_path}"

# reload config with prefix + r
bind -N "Reload tmux config" r source-file ~/.tmux.conf \;display-message "Config reloaded!"

# use vim-like pane navigation
bind -N "Select pane left" h select-pane -L
bind -N "Select pane down" j select-pane -D
bind -N "Select pane up" k select-pane -U
bind -N "Select pane right" l select-pane -R

# Last window (default was 'l', now used for pane navigation)
bind -N "Last window" Tab last-window

set -g pane-border-lines heavy

# Use vi style copy mode
setw -g mode-keys vi

# Begin selection with v
bind-key -N "Begin selection" -T copy-mode-vi v send-keys -X begin-selection

# Don't jump to bottom after copy (requires tmux-yank plugin)
set -g @yank_action 'copy-pipe'

# Sort sessions by name
bind -N "Choose session (sorted by name)" s choose-tree -sZ -O name

# Go into url select mode with prefix + u
bind -N "URL select mode" u run '~/.tmux/plugins/tmux-url-select/tmux-url-select.pl'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Pane border settings (after tpm to prevent theme override)
set -g pane-border-status top
set -g pane-border-format " #{pane_id} "
set -g mode-style "bg=#{@thm_pink},fg=#{@thm_bg}"

